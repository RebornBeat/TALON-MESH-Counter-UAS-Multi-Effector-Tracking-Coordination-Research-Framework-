<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">

  <!-- Background -->
  <rect width="960" height="580" fill="#0f1117" rx="8"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">TALON-MESH — Multi-Center Engagement Assignment Flow</text>
  <text x="480" y="50" text-anchor="middle" fill="#64748b" font-size="10">LOS-Aware Greedy Submodular Optimization · Sealed Effector Interface · Civilian-Transfer Architecture</text>

  <!-- Defs -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- ── ROW 1: Input pipeline ── -->

  <!-- Block 1: Perception -->
  <rect x="20" y="68" width="170" height="90" rx="5" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="105" y="90" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="bold">Perception Layer</text>
  <text x="105" y="106" text-anchor="middle" fill="#94a3b8" font-size="8.5">Multi-Modal Fusion</text>
  <text x="105" y="119" text-anchor="middle" fill="#94a3b8" font-size="8.5">Radar + Acoustic + RF</text>
  <text x="105" y="132" text-anchor="middle" fill="#94a3b8" font-size="8.5">DetectionEvent stream</text>
  <text x="105" y="148" text-anchor="middle" fill="#475569" font-size="7.5">omni-sense-fusion::CI</text>

  <!-- Arrow 1→2 -->
  <line x1="190" y1="113" x2="218" y2="113" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="204" y="108" text-anchor="middle" fill="#475569" font-size="7.5">FusedTrack</text>

  <!-- Block 2: PentaTrack -->
  <rect x="220" y="68" width="185" height="90" rx="5" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="312" y="90" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold">PentaTrack Bridge</text>
  <text x="312" y="106" text-anchor="middle" fill="#94a3b8" font-size="8.5">Predictive Center Field</text>
  <text x="312" y="119" text-anchor="middle" fill="#94a3b8" font-size="8.5">Velocity-weighted centers</text>
  <rect x="240" y="128" width="144" height="18" rx="2" fill="#14532d" stroke="#4ade80" stroke-width="0.8"/>
  <text x="312" y="140" text-anchor="middle" fill="#86efac" font-size="7.5" font-weight="bold">9 Weighted Centers · Σpᵢ = 1.0</text>

  <!-- Arrow 2→3 -->
  <line x1="405" y1="113" x2="433" y2="113" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="419" y="108" text-anchor="middle" fill="#475569" font-size="7.5">CenterField</text>

  <!-- Block 3: LOS Filter -->
  <rect x="435" y="68" width="175" height="90" rx="5" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="522" y="90" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="bold">LOS Quality Filter</text>
  <text x="522" y="106" text-anchor="middle" fill="#94a3b8" font-size="8.5">Ray-march each center</text>
  <text x="522" y="119" text-anchor="middle" fill="#94a3b8" font-size="8.5">LOS &lt; 0.3 → excluded</text>
  <text x="522" y="132" text-anchor="middle" fill="#94a3b8" font-size="8.5">Beer-Lambert applied</text>
  <text x="522" y="148" text-anchor="middle" fill="#475569" font-size="7.5">halo-geometry::los_quality()</text>

  <!-- Arrow 3→4 -->
  <line x1="610" y1="113" x2="638" y2="113" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="624" y="108" text-anchor="middle" fill="#475569" font-size="7.5">filtered</text>

  <!-- Block 4: Greedy Solver -->
  <rect x="640" y="68" width="190" height="90" rx="5" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="735" y="90" text-anchor="middle" fill="#10b981" font-size="10" font-weight="bold">Greedy Submodular</text>
  <text x="735" y="106" text-anchor="middle" fill="#94a3b8" font-size="8.5">Max marginal coverage/slot</text>
  <text x="735" y="119" text-anchor="middle" fill="#94a3b8" font-size="8.5">Weighted set-cover iter</text>
  <rect x="665" y="127" width="140" height="18" rx="2" fill="#064e3b" stroke="#34d399" stroke-width="0.8"/>
  <text x="735" y="139" text-anchor="middle" fill="#6ee7b7" font-size="7.5" font-weight="bold">(1 − 1/e) approximation guarantee</text>

  <!-- Arrow 4→5 down -->
  <line x1="735" y1="158" x2="735" y2="192" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="755" y="178" fill="#475569" font-size="7.5">Vec&lt;Assignment&gt;</text>

  <!-- ── ROW 2: Decision + Effector ── -->

  <!-- Block 5: Effector Assignment -->
  <rect x="620" y="195" width="230" height="80" rx="5" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="735" y="218" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="bold">Effector Assignment</text>
  <text x="735" y="233" text-anchor="middle" fill="#94a3b8" font-size="8.5">slot → center map</text>
  <text x="735" y="246" text-anchor="middle" fill="#94a3b8" font-size="8.5">slew time / cooldown checked</text>
  <text x="735" y="264" text-anchor="middle" fill="#475569" font-size="7.5">talon-decision::Planner</text>

  <!-- Arrow 5→6 left -->
  <line x1="620" y1="235" x2="575" y2="235" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Block 6: SimulatedEffector -->
  <rect x="370" y="195" width="205" height="80" rx="5" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
  <text x="472" y="218" text-anchor="middle" fill="#ec4899" font-size="10" font-weight="bold">SimulatedEffector</text>
  <text x="472" y="233" text-anchor="middle" fill="#94a3b8" font-size="8.5">sealed Effector trait</text>
  <text x="472" y="248" text-anchor="middle" fill="#94a3b8" font-size="8.5">simulate_engagement()</text>
  <rect x="395" y="258" width="154" height="14" rx="2" fill="#4c0519" stroke="#f43f5e" stroke-width="0.8"/>
  <text x="472" y="268" text-anchor="middle" fill="#fb7185" font-size="7" font-weight="bold">NO hardware I/O path exists</text>

  <!-- Arrow 6→7 left -->
  <line x1="370" y1="235" x2="330" y2="235" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Block 7: Assignment Trace -->
  <rect x="130" y="195" width="200" height="80" rx="5" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="230" y="218" text-anchor="middle" fill="#06b6d4" font-size="10" font-weight="bold">Assignment Trace</text>
  <text x="230" y="233" text-anchor="middle" fill="#94a3b8" font-size="8.5">assignment_trace.csv</text>
  <text x="230" y="248" text-anchor="middle" fill="#94a3b8" font-size="8.5">outcome_statistics.csv</text>
  <text x="230" y="264" text-anchor="middle" fill="#475569" font-size="7.5">probability_mass_covered</text>

  <!-- Arrow 7→8 left -->
  <line x1="130" y1="235" x2="95" y2="235" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Block 8: Report -->
  <rect x="20" y="195" width="75" height="80" rx="5" fill="#1e293b" stroke="#84cc16" stroke-width="1.5"/>
  <text x="57" y="218" text-anchor="middle" fill="#84cc16" font-size="8.5" font-weight="bold">Report</text>
  <text x="57" y="233" text-anchor="middle" fill="#94a3b8" font-size="7.5">HTML</text>
  <text x="57" y="246" text-anchor="middle" fill="#94a3b8" font-size="7.5">charts</text>
  <text x="57" y="259" text-anchor="middle" fill="#94a3b8" font-size="7.5">metrics</text>

  <!-- ── ROW 3: Policy Comparison ── -->
  <rect x="20" y="310" width="920" height="100" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="480" y="330" text-anchor="middle" fill="#64748b" font-size="9" font-weight="bold">Policy Comparison — Same scenario · Same seed · Three assignment policies run simultaneously</text>

  <rect x="40" y="338" width="270" height="60" rx="3" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="175" y="356" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="bold">NaiveNearest</text>
  <text x="175" y="370" text-anchor="middle" fill="#94a3b8" font-size="8">Distance only · Single center selected</text>
  <text x="175" y="384" text-anchor="middle" fill="#94a3b8" font-size="8">Baseline — lowest coverage rate</text>
  <text x="175" y="395" text-anchor="middle" fill="#475569" font-size="7">talon-decision::NaiveNearest</text>

  <rect x="345" y="338" width="270" height="60" rx="3" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="480" y="356" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="bold">LosAware</text>
  <text x="480" y="370" text-anchor="middle" fill="#94a3b8" font-size="8">LOS cost function · Single center</text>
  <text x="480" y="384" text-anchor="middle" fill="#94a3b8" font-size="8">Moderate — avoids blocked paths</text>
  <text x="480" y="395" text-anchor="middle" fill="#475569" font-size="7">talon-decision::LosAware</text>

  <rect x="650" y="338" width="270" height="60" rx="3" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="785" y="356" text-anchor="middle" fill="#10b981" font-size="9" font-weight="bold">MultiCenterOptimal</text>
  <text x="785" y="370" text-anchor="middle" fill="#94a3b8" font-size="8">LOS + greedy submodular N centers</text>
  <text x="785" y="384" text-anchor="middle" fill="#94a3b8" font-size="8">Highest — (1−1/e) proven bound</text>
  <text x="785" y="395" text-anchor="middle" fill="#475569" font-size="7">talon-decision::MultiCenterOptimal</text>

  <!-- ── ROW 4: Civilian Transfer ── -->
  <rect x="20" y="430" width="920" height="90" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="480" y="450" text-anchor="middle" fill="#64748b" font-size="9" font-weight="bold">Civilian Transfer — Same talon-decision crate · Different physical interpretation of Effector trait</text>

  <rect x="40" y="460" width="270" height="48" rx="3" fill="#1e293b" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="175" y="476" text-anchor="middle" fill="#3b82f6" font-size="8.5" font-weight="bold">Industrial Sorting</text>
  <text x="175" y="490" text-anchor="middle" fill="#94a3b8" font-size="8">Effectors = robotic arms</text>
  <text x="175" y="502" text-anchor="middle" fill="#94a3b8" font-size="8">Targets = conveyor items</text>

  <rect x="345" y="460" width="270" height="48" rx="3" fill="#1e293b" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="480" y="476" text-anchor="middle" fill="#8b5cf6" font-size="8.5" font-weight="bold">Sports Broadcast</text>
  <text x="480" y="490" text-anchor="middle" fill="#94a3b8" font-size="8">Effectors = PTZ cameras</text>
  <text x="480" y="502" text-anchor="middle" fill="#94a3b8" font-size="8">Targets = players</text>

  <rect x="650" y="460" width="270" height="48" rx="3" fill="#1e293b" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="785" y="476" text-anchor="middle" fill="#f59e0b" font-size="8.5" font-weight="bold">Agricultural Inspection</text>
  <text x="785" y="490" text-anchor="middle" fill="#94a3b8" font-size="8">Effectors = inspection drones</text>
  <text x="785" y="502" text-anchor="middle" fill="#94a3b8" font-size="8">Targets = field survey plots</text>

  <!-- Footer note -->
  <text x="480" y="555" text-anchor="middle" fill="#334155" font-size="8">SimulatedOutcome is a Rust value — not a physical command. No hardware I/O path exists in this crate.</text>

</svg>
